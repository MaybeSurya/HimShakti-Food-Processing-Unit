<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HimShakti - Login</title>
<!-- Material Symbols -->

                        "secondary": "#5f5e5b",

                        "primary-fixed-dim": "#8bd6b6",

<style>
        body {
            /* Alpine Purity - Minimalist background */
            background-color: #faf8ff; 
        }
        
        .input-organic {
            border: 1px solid #E2E8F0;
            background-color: #ffffff;
            transition: all 0.3s ease;
        }
        
        .input-organic:focus {
            border-color: #004532;
            border-width: 2px;
            outline: none;
            box-shadow: none;
        }

        .btn-primary {
            background-color: #004532;
            color: #ffffff;
            border-radius: 16px;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            box-shadow: 0px 10px 30px rgba(15, 23, 42, 0.08);
            transform: translateY(-1px);
        }

        .card-organic {
            background-color: #FAF7F2; /* Cream background from spec */
            border-radius: 24px;
            border: none;
        }
        
        /* Suppressing TopNavBar and Footer as per Transactional rule */
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-gutter md:p-section-gap-desktop text-on-surface font-body-md antialiased">
<!-- Main Canvas -->
<main class="w-full max-w-md mx-auto">
<!-- Brand Header (Simplified for transactional intent) -->
<div class="text-center mb-8">
<h1 class="text-headline-md font-headline-md font-extrabold text-primary tracking-tight">HimShakti</h1>
<p class="text-body-md font-body-md text-on-surface-variant mt-2">Welcome back to the mountains.</p>
</div>
<!-- Login Card -->
<div class="card-organic p-8 md:p-10 shadow-sm relative overflow-hidden">
<!-- Subtle decorative organic shape in background -->
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-full -mr-16 -mt-16 pointer-events-none"></div>
<form action="#" class="space-y-6 relative z-10" method="POST">
<!-- Email Input -->
<div>
<label class="block text-label-md font-label-md text-on-surface mb-2" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant" style="font-variation-settings: 'FILL' 0;">mail</span>
<input class="input-organic w-full pl-12 pr-4 py-3 rounded-xl text-body-md font-body-md text-on-surface placeholder:text-outline" id="email" name="email" placeholder="you@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div>
<div class="flex items-center justify-between mb-2">
<label class="block text-label-md font-label-md text-on-surface" for="password">Password</label>
<a class="text-label-sm font-label-sm text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant" style="font-variation-settings: 'FILL' 0;">lock</span>
<input class="input-organic w-full pl-12 pr-4 py-3 rounded-xl text-body-md font-body-md text-on-surface placeholder:text-outline" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Actions -->
<div class="pt-4">
<button class="btn-primary w-full py-4 text-label-md font-label-md flex justify-center items-center gap-2" type="submit">
                        Sign In
                        <span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</div>
</form>
<!-- Toggle Signup -->
<div class="mt-8 text-center">
<p class="text-body-md font-body-md text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-label-md font-label-md text-primary hover:text-primary-container transition-colors ml-1" href="#">Create one</a>
</p>
</div>
</div>
<!-- Organic Image Mask Example below card for visual balance -->
<div class="mt-12 w-full h-32 rounded-[40px_10px_40px_10px] overflow-hidden opacity-60">
<div class="bg-cover bg-center w-full h-full" data-alt="A serene, minimalist landscape of the Himalayan mountains at dawn. Soft, diffuse morning light washing over rugged peaks, creating a calm, pure atmosphere. The color palette features pale stone greys, soft misty whites, and subtle hints of forest green in the lower valleys. High-quality, clean, organic aesthetic suitable for a premium brand." style="background-image: url('../screenshots/05-login-signup.png')"></div>
</div>
</main>
<script>
        // Simple micro-interaction: Subtle fade in on load
        document.addEventListener("DOMContentLoaded", () => {
            const card = document.querySelector('.card-organic');
            card.style.opacity = '0';
            card.style.transform = 'translateY(10px)';
            
            setTimeout(() => {
                card.style.transition = 'opacity 0.6s ease-out, transform 0.6s ease-out';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body></html>
